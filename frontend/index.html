<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Zephron is a futuristic Jarvis-style local voice assistant with continuous listening and voice replies.">
    <title>Zephron | Crimson Core</title>
    <link rel="stylesheet" href="./style.css?v=20260406b">
</head>

<body>
    <main class="jarvis-shell">
        <header class="hud">
            <p class="label">Voice Assistant</p>
            <h1>Zephron</h1>
            <p class="subtitle">Crimson Core interface. Futuristic mode. Continuous listening.</p>
            <p class="label" aria-label="Theme build">Theme build 2026.04.06-B</p>
        </header>

        <section class="core" aria-label="Assistant status">
            <div class="reactor" id="reactor"></div>
            <div class="status-grid">
                <article class="status-card">
                    <span>State</span>
                    <strong id="assistant-status">Ready</strong>
                </article>
                <article class="status-card">
                    <span>Listening</span>
                    <strong id="listen-state">Off</strong>
                </article>
                <article class="status-card">
                    <span>Clock</span>
                    <strong id="clock-time">--:--</strong>
                </article>
                <article class="status-card wide">
                    <span>Last heard</span>
                    <strong id="context-text">System online. Awaiting voice command.</strong>
                </article>
            </div>
        </section>

        <section class="controls" aria-label="Assistant controls">
            <button id="speak-toggle" type="button" class="control">Voice reply: Off</button>
            <button id="continuous-toggle" type="button" class="control primary">Always listen: Off</button>
            <button id="mic-button" type="button" class="control">Listen once</button>
            <button id="clear-chat" type="button" class="control">Clear log</button>
        </section>

        <section class="console" aria-label="Conversation log">
            <div id="message-list" class="message-list" aria-live="polite"></div>
            <form id="composer" class="composer" autocomplete="off">
                <label class="sr-only" for="assistant-input">Ask Zephron</label>
                <input id="assistant-input" name="assistant-input" type="text" placeholder="Type or say: Jarvis, what time is it" />
                <button class="control primary" type="submit">Send</button>
            </form>
        </section>
    </main>

    <script src="./script.js?v=20260406b"></script>
</body>

</html>
